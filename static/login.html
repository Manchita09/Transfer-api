<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Login - Transfer API</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      height: 100vh;

      /* Fondo */
      background: radial-gradient(circle at top, #1a237e, #000);

      /* CENTRADO */
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    /* TARJETA */
    .card {
      background: rgba(255, 255, 255, 0.1); /* transparente */
      backdrop-filter: blur(10px); /* efecto glass */
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      text-align: center;

      /* glow azul */
      box-shadow: 0 0 20px rgba(0, 0, 255, 0.5);
    }

    h3 {
      margin-bottom: 20px;
      color: #fff;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
      outline: none;
    }

    /* BOTÓN */
    button {
      width: 100%;
      padding: 10px;
      background: #1a237e; /* azul */
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #3949ab;
      transform: scale(1.05);
    }

    button:disabled {
      background: #666;
      cursor: not-allowed;
      opacity: 0.7;
    }

    #msg {
      margin-top: 10px;
      font-weight: bold;
      min-height: 20px;
    }
  </style>
</head>

<body>

  <div class="card">
    <h3>Iniciar sesión</h3>

    <input id="username" placeholder="Usuario" />
    <input id="password" type="password" placeholder="Contraseña" />

    <button id="btn">Entrar</button>

    <p id="msg"></p>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
